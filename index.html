<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Takon AI – Asisten Cerdas Indonesia</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.06);
            --glass-blur: blur(18px);
            --text: #1a1a2e;
            --text-secondary: #4a4a5e;
            --primary: #3d2da6;
            --primary-glow: rgba(61,45,166,0.3);
            --accent: #c8944a;
            --bg: #f0ece6;
            --surface: rgba(255,255,255,0.6);
            --bubble-ai: rgba(245,241,235,0.85);
            --bubble-user: linear-gradient(135deg, #3d2da6, #6247d4);
            --input-glass: rgba(255,255,255,0.7);
            --header-glass: rgba(255,255,255,0.65);
            --modal-glass: rgba(255,255,255,0.85);
            --radius: 22px;
            --radius-sm: 16px;
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255,255,255,0.08);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
            --bg: #111119;
            --surface: rgba(30,30,40,0.6);
            --bubble-ai: rgba(30,30,40,0.75);
            --bubble-user: linear-gradient(135deg, #3d2da6, #5b4cc4);
            --input-glass: rgba(30,30,40,0.7);
            --header-glass: rgba(20,20,30,0.7);
            --modal-glass: rgba(30,30,40,0.9);
            --primary-glow: rgba(91,76,196,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 30% 30%, rgba(61,45,166,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(200,148,74,0.08) 0%, transparent 60%);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glass header */
        .header {
            z-index: 10;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            background: var(--header-glass);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            margin: 0 16px;
            position: relative;
            top: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }

        .logo {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            box-shadow: 0 6px 16px var(--primary-glow);
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .subtitle {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: var(--font);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 8px 20px var(--primary-glow);
            transform: translateY(-1px);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        .btn-danger {
            border-color: #e05555;
            color: #e05555;
        }

        .btn-danger:hover {
            background: #e05555;
            color: white;
            box-shadow: 0 8px 20px rgba(224,85,85,0.3);
        }

        /* Chat container */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 12px auto 0;
            border-radius: var(--radius) var(--radius) 0 0;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-bottom: none;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            padding: 20px;
            animation: fadeUp 0.5s;
        }

        .welcome-icon {
            font-size: 4rem;
            filter: drop-shadow(0 4px 12px var(--primary-glow));
        }

        .welcome-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .welcome-desc {
            color: var(--text-secondary);
            max-width: 400px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .chip {
            background: var(--glass-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text);
        }

        .chip:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 6px 16px var(--primary-glow);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeUp 0.35s;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .ai .avatar {
            background: rgba(200,148,74,0.3);
            color: #5c3d1a;
        }

        .user .avatar {
            background: var(--primary);
            color: white;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            line-height: 1.6;
            font-size: 0.93rem;
            word-break: break-word;
            backdrop-filter: blur(12px);
        }

        .ai .bubble {
            background: var(--bubble-ai);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
        }

        .user .bubble {
            background: var(--bubble-user);
            color: white;
            border-top-right-radius: 4px;
            box-shadow: 0 6px 16px rgba(61,45,166,0.25);
        }

        .time {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
        }

        .user .time {
            text-align: right;
        }

        /* Glass input */
        .input-area {
            padding: 12px 16px 20px;
            background: transparent;
        }

        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--input-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 6px 8px 6px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            transition: 0.2s;
        }

        .input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 8px 28px var(--primary-glow);
        }

        .input-wrap textarea {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            font-family: var(--font);
            font-size: 0.95rem;
            padding: 10px 0;
            color: var(--text);
            outline: none;
            max-height: 140px;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: 0 6px 16px var(--primary-glow);
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .input-hint {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 6px;
            opacity: 0.7;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            backdrop-filter: blur(20px);
            background: var(--modal-glass);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            box-shadow: var(--glass-shadow);
            animation: slideIn 0.3s;
            cursor: pointer;
        }

        @keyframes slideIn {
            from { transform: translateX(60px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

        /* Markdown within bubble */
        .bubble pre {
            background: rgba(0,0,0,0.06);
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
            position: relative;
        }
        [data-theme="dark"] .bubble pre {
            background: rgba(255,255,255,0.05);
        }
        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .header { margin: 0 8px; padding: 10px 16px; }
            .main { margin: 8px 4px 0; }
        }
    </style>
</head>
<body data-theme="light">

    <header class="header">
        <div class="brand">
            <div class="logo">T</div>
            <div>
                <div class="title">Takon AI</div>
                <div class="subtitle">Asisten Cerdas</div>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-icon" id="themeToggle" title="Ganti tema">🌓</button>
            <button class="btn btn-icon" id="clearChat" title="Hapus percakapan">🗑️</button>
        </div>
    </header>

    <div class="main">
        <div class="messages-container" id="messagesContainer">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🤖</div>
                <div class="welcome-title">Halo! Aku Takon AI</div>
                <div class="welcome-desc">
                    Tanya apa saja dalam bahasa Indonesia. Aku siap bantu jawab, kasih ide, atau temani ngobrol.
                </div>
                <div class="chips">
                    <button class="chip" data-prompt="Jelaskan budaya Betawi secara singkat">🎭 Budaya Betawi</button>
                    <button class="chip" data-prompt="Buat puisi tentang senja di pantai">🌅 Puisi Senja</button>
                    <button class="chip" data-prompt="Apa itu machine learning? Jelaskan sederhana">🧠 Machine Learning</button>
                    <button class="chip" data-prompt="Tulis kode HTML form kontak sederhana">💻 Kode HTML</button>
                    <button class="chip" data-prompt="Rekomendasi kuliner khas Bandung">🍜 Kuliner Bandung</button>
                    <button class="chip" data-prompt="Tips belajar efektif untuk ujian">📚 Tips Ujian</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea id="messageInput" rows="1" placeholder="Ketik pertanyaanmu..." maxlength="8000"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div class="input-hint">Enter untuk kirim · Shift+Enter untuk baris baru</div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (() => {
            const LS_MESSAGES = 'takon-ai-messages';
            const LS_THEME = 'takon-ai-theme';

            const state = {
                messages: JSON.parse(localStorage.getItem(LS_MESSAGES) || '[]'),
                theme: localStorage.getItem(LS_THEME) || 'light',
                isStreaming: false,
                abortController: null,
                model: 'llama-3.1-8b-instant'
            };

            const $ = (s) => document.querySelector(s);
            const container = $('#messagesContainer');
            const welcome = $('#welcomeScreen');
            const input = $('#messageInput');
            const sendBtn = $('#sendBtn');
            const themeToggle = $('#themeToggle');
            const clearBtn = $('#clearChat');
            const toastContainer = $('#toastContainer');

            function applyTheme(t) {
                state.theme = t;
                document.body.setAttribute('data-theme', t);
                localStorage.setItem(LS_THEME, t);
                themeToggle.textContent = t === 'dark' ? '☀️' : '🌓';
            }

            function saveMessages() {
                localStorage.setItem(LS_MESSAGES, JSON.stringify(state.messages.slice(-150)));
            }

            function renderAll() {
                container.querySelectorAll('.message').forEach(el => el.remove());
                state.messages.forEach((m,i) => renderMessage(m,i));
                updateWelcome();
                scrollBottom();
            }

            function renderMessage(msg, idx) {
                const el = document.createElement('div');
                el.className = `message ${msg.role}`;
                el.dataset.index = idx;
                el.innerHTML = `
                    <div class="avatar">${msg.role === 'user' ? 'K' : 'T'}</div>
                    <div>
                        <div class="bubble">${formatContent(msg.content)}</div>
                        <div class="time">${formatTime(msg.timestamp)}</div>
                    </div>
                `;
                container.appendChild(el);
            }

            function formatContent(text) {
                let html = escapeHtml(text);
                // code blocks
                html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
                    return `<pre><code>${escapeHtml(code.trim())}</code><button class="copy-btn" data-code="${escapeHtml(code.trim())}">📋</button></pre>`;
                });
                // inline code
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                // bold/italic
                html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
                html = html.replace(/\n/g, '<br>');
                return html;
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatTime(ts) {
                if (!ts) return '';
                const d = new Date(ts);
                return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
            }

            function updateWelcome() {
                welcome.style.display = state.messages.length === 0 ? 'flex' : 'none';
            }

            function scrollBottom() {
                setTimeout(() => container.scrollTop = container.scrollHeight, 50);
            }

            async function sendMessage() {
                const content = input.value.trim();
                if (!content || state.isStreaming) return;
                input.value = '';
                autoResize();
                addMessage('user', content);
                const aiMsg = addMessage('assistant', '');
                const idx = state.messages.length - 1;
                state.isStreaming = true;
                updateSendBtn();

                try {
                    state.abortController = new AbortController();
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: state.messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
                            model: state.model
                        }),
                        signal: state.abortController.signal
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let full = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const data = line.slice(6).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta?.content || '';
                                full += delta;
                                state.messages[idx].content = full;
                                updateBubble(idx, full);
                                scrollBottom();
                            } catch(e){}
                        }
                    }
                    state.messages[idx].timestamp = Date.now();
                } catch(e) {
                    if (e.name !== 'AbortError') {
                        state.messages[idx].content = `❌ Gagal: ${e.message}`;
                        updateBubble(idx, state.messages[idx].content);
                    }
                } finally {
                    state.isStreaming = false;
                    state.abortController = null;
                    updateSendBtn();
                    saveMessages();
                    updateWelcome();
                }
            }

            function addMessage(role, content) {
                const msg = { role, content, timestamp: Date.now() };
                state.messages.push(msg);
                saveMessages();
                renderMessage(msg, state.messages.length - 1);
                updateWelcome();
                scrollBottom();
                return msg;
            }

            function updateBubble(idx, content) {
                const msgEl = container.querySelector(`.message[data-index="${idx}"] .bubble`);
                if (msgEl) msgEl.innerHTML = formatContent(content);
            }

            function updateSendBtn() {
                if (state.isStreaming) {
                    sendBtn.textContent = '⏹';
                    sendBtn.style.background = '#e05555';
                } else {
                    sendBtn.textContent = '➤';
                    sendBtn.style.background = '';
                    sendBtn.disabled = input.value.trim() === '';
                }
            }

            function autoResize() {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 140) + 'px';
            }

            // Event listeners
            sendBtn.addEventListener('click', () => state.isStreaming ? state.abortController?.abort() : sendMessage());
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    state.isStreaming ? state.abortController?.abort() : sendMessage();
                }
            });
            input.addEventListener('input', () => {
                autoResize();
                updateSendBtn();
            });
            themeToggle.addEventListener('click', () => applyTheme(state.theme === 'dark' ? 'light' : 'dark'));
            clearBtn.addEventListener('click', () => {
                if (state.messages.length && confirm('Hapus semua percakapan?')) {
                    state.messages = [];
                    saveMessages();
                    container.querySelectorAll('.message').forEach(e => e.remove());
                    updateWelcome();
                }
            });

            document.addEventListener('click', e => {
                if (e.target.classList.contains('copy-btn')) {
                    const code = e.target.dataset.code;
                    navigator.clipboard.writeText(code);
                    e.target.textContent = '✅';
                    setTimeout(() => e.target.textContent = '📋', 1500);
                }
                const chip = e.target.closest('.chip');
                if (chip && !state.isStreaming) {
                    const prompt = chip.dataset.prompt;
                    input.value = prompt;
                    autoResize();
                    updateSendBtn();
                    sendMessage();
                }
            });

            // Init
            applyTheme(state.theme);
            renderAll();
            input.focus();
            updateSendBtn();
        })();
    </script>
</body>
</html>
